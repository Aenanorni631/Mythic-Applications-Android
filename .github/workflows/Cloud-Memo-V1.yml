name: Cloud-Memo-V1
on: 
  push:
    branches:
      - 'Cloud-Memo-V1.0'  # Restricts execution to this branch only
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hello-World-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
